    --green:#27ae60; --amber:#e67e22;

  *{box-sizing:border-box;margin:0;padding:0}

  .btn-gold{background:var(--gold);color:var(--navy);padding:8px 16px}
  .btn-gold:hover{background:var(--gold2)}
  .btn-red{background:var(--red);color:#fff;padding:8px 16px}
  .btn-ghost{background:transparent;border:1px solid var(--navy3);color:var(--grey);padding:6px 12px}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  input[type=number]{background:var(--navy2);border:2px solid var(--navy3);color:var(--white);border-radius:8px;padding:8px;font-size:1.2rem;font-weight:700;text-align:center;width:52px;-moz-appearance:textfield}
  input[type=number]::-webkit-inner-spin-button{display:none}
  input[type=number]:focus{outline:none;border-color:var(--gold)}
  input[type=number]:disabled{opacity:.5;cursor:not-allowed}
  input[type=text],input[type=password]{background:var(--navy2);border:1.5px solid var(--navy3);color:var(--white);border-radius:8px;padding:10px 14px;width:100%}
  input[type=text]:focus,input[type=password]:focus{outline:none;border-color:var(--gold)}
  .badge{display:inline-block;border-radius:99px;padding:2px 8px;font-size:.7rem;font-weight:700;letter-spacing:.05em}
  .badge-gold{background:var(--gold);color:var(--navy)}
  .badge-green{background:var(--green);color:#fff}
  .badge-red{background:var(--red);color:#fff}
  .badge-grey{background:var(--grey2);color:var(--grey)}
  .badge-amber{background:var(--amber);color:#fff}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
  .modal{background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
  .pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .slide-down{animation:slideDown .3s ease}
  @keyframes pop{0%{transform:scale(.95)}70%{transform:scale(1.05)}100%{transform:scale(1)}}

const hoursUntil = (utc) => (new Date(utc) - new Date()) / 36e5;
const isLocked  = (utc) => hoursUntil(utc) <= 0;
const isStarted = (utc) => hoursUntil(utc) < 0;

const stageLabel = s => ({
  group:'Group Stage', r32:'Round of 32', r16:'Round of 16',
  qf:'Quarter-Finals', sf:'Semi-Finals', '3rd':'3rd Place Play-off', final:'Final'
}[s] || s);

// Pre-computed O(1) lookups — built once at module load
const MATCH_BY_ID = Object.fromEntries(MATCHES.map(m => [m.id, m]));
const MATCH_TIME  = Object.fromEntries(MATCHES.map(m => [m.id, fmtShort(m.utc)]));

function calcPoints(pred, actual) {
  if (!pred || actual.home == null || actual.away == null) return null;
  const predOut  = Math.sign(pred.home - pred.away);
  const actOut   = Math.sign(actual.home - actual.away);
  if (predOut !== actOut) return 0;
  return (pred.home === actual.home && pred.away === actual.away) ? 5 : 3;
}

function buildLeaderboard(predictions, scores, players) {
  return players.map(p => {
    let total=0, outcomes=0, perfects=0, played=0;
    const detail = {};
    MATCHES.forEach(m => {
      const sc = scores[m.id];
      if (!sc || sc.home == null) return;
      played++;
      const pred = predictions[m.id]?.[p.name];
      const pts  = calcPoints(pred, sc);
      if (pts != null) {
        total += pts;
        if (pts >= 3) outcomes++;
        if (pts === 5) perfects++;
      }
      detail[m.id] = { pts, pred, actual: sc };
    });
    return { ...p, total, outcomes, perfects, played, detail };
  }).sort((a,b) => b.total - a.total || b.perfects - a.perfects);
}

async function apiFetch(action) {
  const r = await fetch(`${CONFIG.appsScriptUrl}?action=${action}`);
  return r.json();
}
async function apiPost(body) {
  try {
    await fetch(CONFIG.appsScriptUrl, {
      method:'POST',
      mode:'no-cors',
      body: JSON.stringify(body)
    });
  } catch(e) {
    console.warn('apiPost error:', e);
  }
}

function parsePredictions(rows) {
  const out = {};
  rows.forEach(r => {
    const mid = parseInt(r.MatchID);
    if (!out[mid]) out[mid] = {};
    out[mid][r.PlayerName] = { home: parseInt(r.HomeGoals), away: parseInt(r.AwayGoals) };
  });
  return out;
}
function parseScores(rows) {
  const out = {};
  rows.forEach(r => { out[parseInt(r.MatchID)] = { home: parseInt(r.HomeGoals), away: parseInt(r.AwayGoals), status: r.Status }; });
  return out;
}

function AvatarPlaceholder({ player, size=56, selected, onClick }) {

const PlayerAvatar = React.memo(function PlayerAvatar({ player, size=56, selected, onClick }) {

const ScoreBadge = React.memo(function ScoreBadge({ pts, verbose=false }) {
  if (pts == null) return null;
  if (verbose) {
    if (pts === 5) return <span className="badge badge-gold">🌟 +5</span>;
    if (pts === 3) return <span className="badge badge-green">✅ +3</span>;
    return <span className="badge badge-red">❌ 0</span>;
  }
  // compact icon-only for tight table cells
  if (pts === 5) return <span style={{fontSize:'.7rem'}}>🌟</span>;
  if (pts === 3) return <span style={{fontSize:'.7rem'}}>✅</span>;
  return <span style={{fontSize:'.7rem'}}>❌</span>;
});

// ── MATCH CARD ────────────────────────────────────────────────
const MatchCard = React.memo(function MatchCard({ match, matchPredictions, matchScore, currentPlayer, onSave }) {
  const allPlayers = React.useContext(PlayersCtx);
  const sc = matchScore;
  // Compute once — avoids 3 separate new Date() calls per render
  const hours    = hoursUntil(match.utc);
  const locked   = hours <= 0;
  const started  = hours < 0;
  const finished = sc?.status === 'FINISHED';
  const myPred   = matchPredictions?.[currentPlayer] || {};
  const [homeVal, setHomeVal] = React.useState(myPred.home ?? '');
  const [awayVal, setAwayVal] = React.useState(myPred.away ?? '');
  const [saving,  setSaving]  = React.useState(false);
  const [saved,   setSaved]   = React.useState(false);

  React.useEffect(()=>{
    const p = matchPredictions?.[currentPlayer];
    if (p) { setHomeVal(p.home); setAwayVal(p.away); }
    else { setHomeVal(''); setAwayVal(''); }
  }, [matchPredictions, currentPlayer]);

  const save = async () => {
    if (homeVal === '' || awayVal === '') return;
    setSaving(true);
    await onSave(match.id, parseInt(homeVal), parseInt(awayVal));
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const isTBD = match.home === 'TBD';

  return (
    <div className="match-card" style={{background:'var(--navy2)',borderRadius:12,padding:'16px',marginBottom:12,
      border: finished ? '1px solid var(--green)' : started ? '1px solid var(--amber)' : '1px solid var(--navy3)',
      animation: finished ? 'none' : undefined}}>
      {/* Match Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
        <div>
          {match.group && <span style={{fontSize:'.72rem',color:'var(--gold)',fontWeight:700,letterSpacing:'.05em'}}>GROUP {match.group}</span>}
          {match.label && <span style={{fontSize:'.72rem',color:'var(--gold)',fontWeight:700}}>{match.label}</span>}
          <div style={{fontSize:'.78rem',color:'var(--grey)',marginTop:2}}>{MATCH_TIME[match.id]} CST · {match.venue}</div>
        </div>
        <div style={{textAlign:'right'}}>
          {finished && <span className="badge badge-green">FINAL</span>}
          {started && !finished && <span className="badge badge-amber pulse">LIVE</span>}
          {locked && !started && <span className="badge badge-grey">🔒 Locked</span>}
          {!locked && !started && <span style={{fontSize:'.7rem',color:'var(--grey)'}}>
            Locks in {hours >= 1 ? Math.floor(hours)+'h' : Math.max(1,Math.round(hours*60))+'m'}
          </span>}
        </div>
      </div>

      {/* Teams */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <div style={{flex:1,textAlign:'right'}}>
          <div style={{fontSize:'1.5rem'}}>{isTBD ? '🏳' : flag(match.home)}</div>
          <div style={{fontWeight:700,fontSize:'.9rem'}}>{match.home}</div>
        </div>
        {/* Actual score or VS */}
        {finished ? (
          <div style={{textAlign:'center',background:'var(--navy3)',borderRadius:8,padding:'6px 16px',minWidth:80}}>
            <div style={{fontSize:'1.5rem',fontWeight:800,letterSpacing:2}}>{sc.home} – {sc.away}</div>
            <div style={{fontSize:'.68rem',color:'var(--grey)'}}>FULL TIME</div>
          </div>
        ) : started ? (
          <div style={{textAlign:'center',background:'var(--amber)',borderRadius:8,padding:'6px 16px',minWidth:80}}>
            <div style={{fontSize:'1.5rem',fontWeight:800,color:'var(--navy)'}}>LIVE</div>
          </div>
        ) : (
          <div style={{textAlign:'center',color:'var(--grey)',fontWeight:700,minWidth:40}}>VS</div>
        )}
        <div style={{flex:1,textAlign:'left'}}>
          <div style={{fontSize:'1.5rem'}}>{isTBD ? '🏳' : flag(match.away)}</div>
          <div style={{fontWeight:700,fontSize:'.9rem'}}>{match.away}</div>
        </div>
      </div>

      {/* Prediction Grid */}
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth: allPlayers.length > 8 ? 600 : 420}}>
          <thead>
            <tr>
              <td style={{width:64}}></td>
              {allPlayers.map(p=>(
                <td key={p.name} style={{textAlign:'center',padding:'2px 3px'}}>
                  <PlayerAvatar player={p} size={22}/>
                  <div style={{fontSize:'.58rem',color:p.name===currentPlayer?'var(--gold)':'var(--grey)',marginTop:1,
                    fontWeight:p.name===currentPlayer?700:400,
                    maxWidth:38,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:'1px auto 0'}}>
                    {p.name.length > 5 ? p.name.slice(0,5) : p.name}
                  </div>
                </td>
              ))}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{fontSize:'.7rem',color:'var(--grey)',paddingRight:6}}>Prediction</td>
              {allPlayers.map(p=>{
                const pred = matchPredictions?.[p.name];
                const pts  = finished ? calcPoints(pred, sc) : null;
                const isMe = p.name === currentPlayer;
                return (
                  <td key={p.name} style={{textAlign:'center',padding:'3px 2px'}}>
                    {isMe && !locked ? (
                      <div style={{display:'flex',alignItems:'center',gap:2,justifyContent:'center'}}>
                        <input type="number" min="0" max="20" value={homeVal}
                          onChange={e=>setHomeVal(e.target.value)} style={{width:36,padding:'3px'}}/>
                        <span style={{color:'var(--grey)',fontSize:'.8rem'}}>–</span>
                        <input type="number" min="0" max="20" value={awayVal}
                          onChange={e=>setAwayVal(e.target.value)} style={{width:36,padding:'3px'}}/>
                      </div>
                    ) : pred ? (
                      <div>
                        <span style={{fontWeight:700,fontSize:'.8rem',color:pts===5?'var(--gold)':pts===3?'var(--green)':pts===0?'var(--red)':'var(--white)'}}>
                          {pred.home}–{pred.away}
                        </span>
                        {pts != null && <div style={{marginTop:1}}><ScoreBadge pts={pts}/></div>}
                      </div>
                    ) : (
                      <span style={{color:'var(--navy3)',fontSize:'.75rem'}}>—</span>
                    )}
                  </td>
                );
              })}
            </tr>
          </tbody>
        </table>
      </div>

      {/* Save button */}
      {!locked && (
        <div style={{marginTop:12,textAlign:'right'}}>
          <button className="btn btn-gold" onClick={save} disabled={saving||homeVal===''||awayVal===''}>
            {saving ? '…' : saved ? '✓ Saved!' : 'Save Prediction'}
          </button>
        </div>
      )}
    </div>
  );
});

// ── LEADERBOARD ───────────────────────────────────────────────
function Leaderboard({ predictions, scores }) {
  const allPlayers = React.useContext(PlayersCtx);
  const lb = React.useMemo(() => buildLeaderboard(predictions, scores, allPlayers), [predictions, scores, allPlayers]);
  const [expanded, setExpanded] = React.useState(null);
  const finishedCount = React.useMemo(() => MATCHES.filter(m => scores[m.id]?.status === 'FINISHED').length, [scores]);

  const badges = React.useCallback((p) => {
    const b = [];
    if (lb[0]?.name === p.name && p.total > 0) b.push({icon:'👑', label:'Leader'});
    if (p.perfects >= 3) b.push({icon:'🎯', label:'Perfect Score King'});
    if (p.outcomes > 0 && p.outcomes === p.played) b.push({icon:'🔥', label:'Unbeaten'});
    if (p.total === 0 && p.played > 2) b.push({icon:'💀', label:'Cursed Predictor'});
    return b;
  }, [lb]);

  const medal = ['🥇','🥈','🥉'];

  return (
    <div>
      <div style={{background:'linear-gradient(135deg,var(--navy3),var(--navy2))',borderRadius:16,padding:20,marginBottom:20,textAlign:'center'}}>
        <div style={{fontSize:'2rem'}}>🏆</div>
        <div style={{fontSize:'1.1rem',fontWeight:700,color:'var(--gold)'}}>Leaderboard</div>
        <div style={{fontSize:'.78rem',color:'var(--grey)',marginTop:4}}>
          {finishedCount} of {MATCHES.length} matches completed
        </div>
      </div>

      {/* Top 3 podium */}
      {lb.length >= 3 && (
        <div style={{display:'flex',justifyContent:'center',alignItems:'flex-end',gap:12,marginBottom:24}}>
          {[lb[1],lb[0],lb[2]].map((p,i)=>{
            const heights=[110,140,90];
            const rank=i===1?0:i===0?1:2;
            return (
              <div key={p.name} style={{textAlign:'center',flex:1}}>
                <PlayerAvatar player={p} size={rank===0?60:50}/>
                <div style={{fontWeight:700,fontSize:'.85rem',marginTop:4}}>{p.name}</div>
                <div style={{fontSize:'1.1rem',fontWeight:800,color:'var(--gold)'}}>{p.total}pts</div>
                <div style={{background:rank===0?'var(--gold)':rank===1?'#aaa':'#a0522d',
                  borderRadius:'8px 8px 0 0',height:heights[i],marginTop:8,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'1.5rem'}}>
                  {medal[rank]}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Full ranking */}
      {lb.map((p,i) => (
        <div key={p.name} style={{background:'var(--navy2)',borderRadius:12,marginBottom:8,overflow:'hidden',
          border:'1px solid var(--navy3)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',cursor:'pointer'}}
            onClick={()=>setExpanded(expanded===p.name?null:p.name)}>
            <div style={{width:28,fontWeight:800,fontSize:'1.1rem',color:'var(--grey)'}}>{i+1}</div>
            <PlayerAvatar player={p} size={44}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>{p.name}</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
                {badges(p).map(b=>(
                  <span key={b.label} title={b.label} style={{fontSize:'.8rem'}}>{b.icon} {b.label}</span>
                ))}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'1.4rem',fontWeight:800,color:'var(--gold)'}}>{p.total}</div>
              <div style={{fontSize:'.7rem',color:'var(--grey)'}}>pts</div>
            </div>
            <div style={{color:'var(--grey)',marginLeft:4}}>{expanded===p.name?'▲':'▼'}</div>
          </div>
          {expanded===p.name && (
            <div style={{borderTop:'1px solid var(--navy3)',padding:'12px 16px',background:'var(--navy)'}}>
              <div style={{display:'flex',gap:24,marginBottom:12}}>
                <div><div style={{fontSize:'1.2rem',fontWeight:700,color:'var(--green)'}}>{p.outcomes}</div><div style={{fontSize:'.7rem',color:'var(--grey)'}}>Correct Outcomes</div></div>
                <div><div style={{fontSize:'1.2rem',fontWeight:700,color:'var(--gold)'}}>{p.perfects}</div><div style={{fontSize:'.7rem',color:'var(--grey)'}}>Perfect Scores</div></div>
                <div><div style={{fontSize:'1.2rem',fontWeight:700}}>{p.played}</div><div style={{fontSize:'.7rem',color:'var(--grey)'}}>Matches Played</div></div>
              </div>
              {Object.entries(p.detail).map(([mid,d])=>{
                const m = MATCH_BY_ID[parseInt(mid)];
                if (!m) return null;
                return (
                  <div key={mid} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:'6px 0',borderBottom:'1px solid var(--navy3)',fontSize:'.82rem'}}>
                    <span style={{color:'var(--grey)'}}>{flag(m.home,16)} {m.home} v {m.away} {flag(m.away,16)}</span>
                    <span style={{color:'var(--grey)'}}>Actual: {d.actual.home}–{d.actual.away} | Pred: {d.pred?`${d.pred.home}–${d.pred.away}`:'—'}</span>
                    <ScoreBadge pts={d.pts} verbose/>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── REMINDER BANNER ───────────────────────────────────────────
function ReminderBanner({ predictions, currentPlayer }) {
  const upcoming = MATCHES.filter(m => {
    const h = hoursUntil(m.utc);
    return h > 0 && h < 24 && !isLocked(m.utc);
  });
  const missing = upcoming.filter(m => !predictions[m.id]?.[currentPlayer]);
  if (!missing.length) return null;
  return (
    <div style={{background:'var(--amber)',color:'var(--navy)',padding:'10px 16px',borderRadius:8,
      marginBottom:16,display:'flex',alignItems:'center',gap:8,fontWeight:600,fontSize:'.88rem'}}>
      ⚠️ {missing.length} match{missing.length>1?'es':''} lock in the next 24h — get your picks in!&nbsp;
      <span style={{fontSize:'.8rem',fontWeight:400}}>
        {missing.map(m=>`${m.home} v ${m.away}`).join(' · ')}
      </span>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [currentPlayer, setCurrentPlayer] = React.useState(null);
  const [predictions,   setPredictions]   = React.useState({});
  const [scores,        setScores]         = React.useState({});
  const [extraPlayers,  setExtraPlayers]   = React.useState([]);
  // Fingerprints: track last-seen data signatures so 60s polls that return
  // identical data don't trigger re-renders of all 104 MatchCards.
  const predFpRef  = React.useRef('');
  const scoreFpRef = React.useRef('');
  const allPlayers = React.useMemo(() => {
    const known = new Set(PLAYERS.map(p => p.name));
    return [...PLAYERS, ...extraPlayers.filter(p => !known.has(p.name))];
  }, [extraPlayers]);
  const [tab,           setTab]            = React.useState('predictions');
  const [stageFilter,   setStageFilter]    = React.useState('all');
  const [groupFilter,   setGroupFilter]    = React.useState('all');
  const [dateFilter,    setDateFilter]     = React.useState(() => {
    // Default to today's matches; fall back to 'all' if today has no matches
    const today = new Date().toLocaleDateString('en-US', {timeZone: CONFIG.timezone, month:'short', day:'numeric'});
    return MATCHES.some(m => new Date(m.utc).toLocaleDateString('en-US',{timeZone:CONFIG.timezone,month:'short',day:'numeric'}) === today) ? today : 'all';
  });
  const [showAdmin,     setShowAdmin]      = React.useState(false);
  const [adminUnlocked, setAdminUnlocked] = React.useState(false);
  const [loading,       setLoading]        = React.useState(true);
  const [error,         setError]          = React.useState('');
  const noBackend = CONFIG.appsScriptUrl === 'YOUR_APPS_SCRIPT_URL_HERE';

  const load = React.useCallback(async () => {
    if (noBackend) { setLoading(false); return; }
    try {
      const [pRows, sRows] = await Promise.all([apiFetch('getPredictions'), apiFetch('getScores')]);

      // Cheap fingerprint: row count + latest UpdatedAt. Avoids re-renders when nothing changed.
      const predFp  = pRows.length  + '|' + (pRows[pRows.length - 1]?.UpdatedAt  || '');
      const scoreFp = sRows.length  + '|' + (sRows[sRows.length - 1]?.UpdatedAt  || '');
      if (predFp  !== predFpRef.current)  { predFpRef.current  = predFp;  setPredictions(parsePredictions(pRows)); }
      if (scoreFp !== scoreFpRef.current) { scoreFpRef.current = scoreFp; setScores(parseScores(sRows)); }

      // Auto-register extra players; stable reference if list hasn't changed
      const known  = new Set(PLAYERS.map(p => p.name));
      const extras = [...new Set(pRows.map(r => r.PlayerName).filter(n => n && !known.has(n)))];
      setExtraPlayers(prev => {
        const same = prev.length === extras.length && extras.every((n, i) => prev[i]?.name === n);
        return same ? prev : extras.map(name => ({ name, avatar: '' }));
      });
    } catch(e) { setError('Could not reach backend. Check Apps Script URL.'); }
    setLoading(false);
  }, [noBackend]);

  React.useEffect(()=>{ load(); }, [load]);
  React.useEffect(()=>{
    if (noBackend) return;
    const t = setInterval(load, CONFIG.refreshInterval);
    return ()=>clearInterval(t);
  }, [load, noBackend]);

  const handleSavePrediction = React.useCallback(async (matchId, home, away) => {
    if (!currentPlayer) return;
    setPredictions(prev => ({...prev, [matchId]: {...prev[matchId], [currentPlayer]: {home, away}}}));
    if (!noBackend) await apiPost({ action:'savePrediction', matchId, playerName:currentPlayer, home, away });
  }, [currentPlayer, noBackend]);

  const handleSaveScore = React.useCallback(async (matchId, home, away, status) => {
    setScores(prev => ({...prev, [matchId]: {home, away, status}}));
    if (!noBackend) await apiPost({ action:'saveScore', matchId, home, away, status, pin: CONFIG.adminPin });
  }, [noBackend]);

  const handleFetchLive = React.useCallback(async () => {
    if (!noBackend) await apiPost({ action:'fetchLiveScores', pin: CONFIG.adminPin });
    await load();
  }, [noBackend, load]);

  // Derive sorted unique match dates in CST (sorted by first match UTC on each date)
  const matchDates = React.useMemo(() => {
    const seen = new Map();
    MATCHES.forEach(m => {
      const d = new Date(m.utc).toLocaleDateString('en-US', {timeZone: CONFIG.timezone, month:'short', day:'numeric'});
      if (!seen.has(d)) seen.set(d, m.utc);
    });
    return Array.from(seen.entries())
      .sort((a, b) => new Date(a[1]) - new Date(b[1]))
      .map(([d]) => d);
  }, []);

  const todayLabel = React.useMemo(() => new Date().toLocaleDateString('en-US', {timeZone: CONFIG.timezone, month:'short', day:'numeric'}), []);

  // Filter matches
  const visibleMatches = React.useMemo(() => {
    return MATCHES.filter(m => {
      if (stageFilter !== 'all' && m.stage !== stageFilter) return false;
      if (groupFilter !== 'all' && m.group !== groupFilter) return false;
      if (dateFilter !== 'all') {
        const d = new Date(m.utc).toLocaleDateString('en-US', {timeZone: CONFIG.timezone, month:'short', day:'numeric'});
        if (d !== dateFilter) return false;
      }
      return true;
    });
  }, [stageFilter, groupFilter, dateFilter]);

  const stages = ['all','group','r32','r16','qf','sf','3rd','final'];
  const groups = ['all','A','B','C','D','E','F','G','H','I','J','K','L'];

  const [newPlayerName, setNewPlayerName] = React.useState('');
  const [showNewPlayerInput, setShowNewPlayerInput] = React.useState(false);
  const handleJoinNew = () => {
    const n = newPlayerName.trim();
    if (!n) return;
    setExtraPlayers(prev => {
      if (prev.find(p => p.name === n) || PLAYERS.find(p => p.name === n)) return prev;
      return [...prev, { name: n, avatar: '' }];
    });
    setCurrentPlayer(n);
    setNewPlayerName('');
    setShowNewPlayerInput(false);
  };

  if (!currentPlayer) {
    return (
      <PlayersCtx.Provider value={allPlayers}>
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        {/* Hero */}
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:'4rem',marginBottom:8}}>⚽</div>
          <h1 style={{fontSize:'1.8rem',fontWeight:800,background:'linear-gradient(135deg,var(--gold),var(--gold2))',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}>
            World Cup 2026
          </h1>
          <p style={{color:'var(--grey)',fontSize:'.9rem'}}>Gushti Prediction Game · USA · Canada · Mexico</p>
        </div>
        {/* Player picker */}
        <div style={{background:'var(--navy2)',borderRadius:20,padding:28,maxWidth:600,width:'100%',border:'1px solid var(--navy3)'}}>
          <h2 style={{textAlign:'center',marginBottom:20,fontSize:'1rem',color:'var(--grey)'}}>Who are you?</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(82px,1fr))',gap:14}}>
            {allPlayers.map(p=>(
              <div key={p.name} style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setCurrentPlayer(p.name)}>
                <PlayerAvatar player={p} size={64}/>
                <div style={{marginTop:6,fontSize:'.82rem',fontWeight:600}}>{p.name}</div>
              </div>
            ))}
            {/* New player tile */}
            <div style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setShowNewPlayerInput(v=>!v)}>
              <div style={{width:64,height:64,borderRadius:'50%',border:'2px dashed var(--navy3)',display:'flex',
                alignItems:'center',justifyContent:'center',fontSize:'1.6rem',margin:'0 auto',
                background:'var(--navy)',color:'var(--grey)'}}>＋</div>
              <div style={{marginTop:6,fontSize:'.82rem',color:'var(--grey)'}}>New player</div>
            </div>
          </div>
          {showNewPlayerInput && (
            <div style={{marginTop:20,display:'flex',gap:8}}>
              <input type="text" placeholder="Enter your name…" value={newPlayerName}
                onChange={e=>setNewPlayerName(e.target.value)}
                onKeyDown={e=>e.key==='Enter' && handleJoinNew()}
                style={{flex:1}} autoFocus/>
              <button className="btn btn-gold" onClick={handleJoinNew}>Join</button>
            </div>
          )}
        </div>
        {noBackend && (
          <div style={{marginTop:20,background:'var(--amber)',color:'var(--navy)',padding:'10px 16px',borderRadius:8,
            maxWidth:520,width:'100%',fontSize:'.85rem',fontWeight:600}}>
            ⚠️ Demo mode — set your Apps Script URL in CONFIG to enable live data sync.
          </div>
        )}
      </div>
      </PlayersCtx.Provider>
    );
  }

  return (
    <PlayersCtx.Provider value={allPlayers}>
    <div style={{maxWidth:900,margin:'0 auto',padding:'0 16px 80px'}}>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:100,background:'var(--navy)',
        borderBottom:'1px solid var(--navy3)',padding:'12px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:'1.4rem'}}>⚽</span>
            <div>
              <div style={{fontWeight:800,fontSize:'1rem',color:'var(--gold)'}}>WC 2026</div>
              <div style={{fontSize:'.68rem',color:'var(--grey)'}}>Gushti Predictions</div>
            </div>
          </div>
          {/* Player avatars row — horizontally scrollable for large groups */}
          <div style={{display:'flex',gap:4,alignItems:'center',overflowX:'auto',
            paddingBottom:4,maxWidth:'100%',scrollbarWidth:'none'}}>
            {allPlayers.map(p=>(
              <div key={p.name} style={{position:'relative',flexShrink:0,cursor:'pointer'}} onClick={()=>setCurrentPlayer(p.name)}>
                <PlayerAvatar player={p} size={28} selected={p.name===currentPlayer}/>
                {p.name===currentPlayer && (
                  <div style={{position:'absolute',bottom:-2,left:'50%',transform:'translateX(-50%)',
                    width:5,height:5,borderRadius:'50%',background:'var(--gold)'}}/>
                )}
              </div>
            ))}
            <button className="btn btn-ghost" style={{marginLeft:4,padding:'3px 7px',fontSize:'.75rem',flexShrink:0}}
              onClick={()=>setShowAdmin(true)}>⚙️</button>
          </div>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',gap:4,marginTop:12}}>
          {['predictions','leaderboard'].map(t=>(
            <button key={t} className="btn" onClick={()=>setTab(t)}
              style={{flex:1,padding:'8px',background:tab===t?'var(--gold)':'var(--navy2)',
                color:tab===t?'var(--navy)':'var(--grey)',borderRadius:8,fontSize:'.85rem',
                border:'1px solid var(--navy3)'}}>
              {t==='predictions' ? '📋 Predictions' : '🏆 Leaderboard'}
            </button>
          ))}
        </div>
      </div>

      {/* Reminder banner */}
      <ReminderBanner predictions={predictions} currentPlayer={currentPlayer}/>

      {noBackend && (
        <div style={{background:'var(--amber)',color:'var(--navy)',padding:'8px 12px',borderRadius:8,
          marginBottom:12,fontSize:'.82rem',fontWeight:600}}>
          ⚠️ Demo mode — predictions won't persist. Add Apps Script URL to CONFIG.
        </div>
      )}

      {loading && <div style={{textAlign:'center',padding:40,color:'var(--grey)'}}>Loading…</div>}
      {error && <div style={{color:'var(--red)',padding:12,background:'var(--navy2)',borderRadius:8,marginBottom:12}}>{error}</div>}

      {!loading && tab === 'predictions' && (
        <div>
          {/* Date filter */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:6,marginBottom:6,alignItems:'center'}}>
            <span style={{fontSize:'.72rem',color:'var(--grey)',flexShrink:0,marginRight:2}}>📅</span>
            {[{label:'All Dates', val:'all'}, ...matchDates.map(d=>({label: d===todayLabel?`Today (${d})`:d, val:d}))].map(({label,val})=>(
              <button key={val} className="btn" onClick={()=>setDateFilter(val)}
                style={{whiteSpace:'nowrap',padding:'5px 12px',fontSize:'.78rem',flexShrink:0,
                  background:dateFilter===val?'var(--gold2)':'var(--navy2)',
                  color:dateFilter===val?'var(--navy)':'var(--grey)',
                  border: val===todayLabel&&dateFilter!==val ? '1px solid var(--gold)' : '1px solid var(--navy3)',
                  borderRadius:99,fontWeight:dateFilter===val?700:400}}>
                {label}
              </button>
            ))}
          </div>
          {/* Stage filter */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:8}}>
            {stages.map(s=>(
              <button key={s} className="btn" onClick={()=>{setStageFilter(s);setGroupFilter('all');}}
                style={{whiteSpace:'nowrap',padding:'5px 12px',fontSize:'.78rem',flexShrink:0,
                  background:stageFilter===s?'var(--gold)':'var(--navy2)',
                  color:stageFilter===s?'var(--navy)':'var(--grey)',
                  border:'1px solid var(--navy3)',borderRadius:99}}>
                {s==='all'?'All Matches':stageLabel(s)}
              </button>
            ))}
          </div>
          {/* Group filter (only when group stage selected) */}
          {(stageFilter === 'all' || stageFilter === 'group') && (
            <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:8,marginBottom:12}}>
              {groups.map(g=>(
                <button key={g} className="btn" onClick={()=>setGroupFilter(g)}
                  style={{whiteSpace:'nowrap',padding:'4px 10px',fontSize:'.75rem',flexShrink:0,
                    background:groupFilter===g?'var(--navy3)':'transparent',
                    color:groupFilter===g?'var(--white)':'var(--grey)',
                    border:'1px solid var(--navy3)',borderRadius:99}}>
                  {g==='all'?'All Groups':`Group ${g}`}
                </button>
              ))}
            </div>
          )}
          <div style={{color:'var(--grey)',fontSize:'.78rem',marginBottom:12}}>
            Showing {visibleMatches.length} matches · Playing as <strong style={{color:'var(--gold)'}}>{currentPlayer}</strong>
          </div>
          {visibleMatches.map(m=>(
            <MatchCard key={m.id} match={m}
              matchPredictions={predictions[m.id]}
              matchScore={scores[m.id]}
              currentPlayer={currentPlayer} onSave={handleSavePrediction}/>
          ))}
        </div>
      )}

      {!loading && tab === 'leaderboard' && (
        <Leaderboard predictions={predictions} scores={scores}/>
      )}

      {showAdmin && (
        <AdminModal onClose={()=>setShowAdmin(false)} onSaveScore={handleSaveScore}
          onFetchLive={handleFetchLive} scores={scores}
          adminUnlocked={adminUnlocked} setAdminUnlocked={setAdminUnlocked}/>
      )}
    </div>
    </PlayersCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root'
